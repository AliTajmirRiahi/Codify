<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Security Policy to allow resources from the custom internal scheme -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'none';
               img-src http://codify.resources data:;
               script-src http://codify.resources 'unsafe-inline';
               style-src http://codify.resources 'unsafe-inline';
               connect-src http://codify.resources;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- External Stylesheets -->
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="/Shared/components/toastify.css">
    <!--<link rel="stylesheet" href="/Chat/chat-view.style.css">-->
</head>
<body>
    <!-- Loading Screen Container -->
    <!-- This will be visible by default until onInitData is triggered -->
    <div id="loading-screen" class="loading-screen">
        <codify-image name="loading.svg" class="spinner"></codify-image>
        <h2>Loading Codify AI...</h2>
    </div>
    <div id="main-chat-wrapper" class="chat-wrapper hidden">

        <!-- Toolbar for managing chat history and sessions -->
        <div class="chat-toolbar">
            <!-- Dropdown to select and switch between previous chat threads -->
            <select id="chatHistorySelect" class="chat-history-select">
                <option value="">New Chat</option>
            </select>

            <!-- Button to create a new chat session -->
            <button id="newChatBtn" class="toolbar-btn" title="New Chat">
                <codify-icon name="message-square-plus"></codify-icon>
            </button>

            <!-- Button to delete the current active chat session -->
            <button id="deleteChatBtn" class="toolbar-btn danger" title="Delete Chat">
                <codify-icon name="trash-2"></codify-icon>
            </button>
        </div>

        <!-- Container for displaying chat messages -->
        <div id="chat-container" class="messages-container">
            <!-- Initial welcome state when no messages are present -->
            <div class="chat-welcome-screen">
                <!-- Main Logo -->
                <!--<img src="../Icons/codify-AI-logo-black.svg" alt="Codify AI Logo" class="welcome-logo">-->
                <codify-image name="codify-AI-logo-black.svg" alt="Codify AI Logo" class="welcome-logo"></codify-image>
                <!-- App Title -->
                <h1 class="welcome-title">Codify AI</h1>

                <!-- Welcome Message -->
                <p class="welcome-subtitle">How can I help you code today?</p>
            </div>
        </div>

        <!-- User input section at the bottom -->
        <div class="input-container">
            <div class="input-box-wrapper">

                <!-- Top row: context / file selector -->
                <div class="input-context-row">
                    <button id="addContextBtn" class="context-add-btn" title="Add Context">
                        <codify-icon name="plus"></codify-icon>
                    </button>

                    <div class="context-chip" id="activeDocumentChip">
                        <codify-icon name="scroll-text"></codify-icon>
                        <span class="context-chip-text">Active Document</span>
                        <button class="context-chip-remove" title="Remove Context">
                            <codify-icon name="circle-x"></codify-icon>
                        </button>
                    </div>
                </div>

                <textarea id="userInput"
                          placeholder="Ask Codify..."
                          rows="1"></textarea>

                <!-- Bottom row: agent / model selector + actions -->
                <div class="input-footer-row">
                    <div class="selector-group">
                        <button id="agent-selector-btn" class="selector-btn hidden" title="Select Agent">
                            <codify-icon name="hat-glasses"></codify-icon>
                            <span>Agent</span>
                            <codify-icon name="chevron-down"></codify-icon>
                        </button>

                        <div class="model-selector-wrapper">
                            <button id="model-selector-btn" class="selector-btn" title="Select Model">
                                <codify-icon name="brain"></codify-icon>
                                <span id="current-model-name"></span>
                                <codify-icon name="chevron-down"></codify-icon>
                            </button>

                            <div id="model-dropdown-menu" class="model-dropdown">
                                <div class="menu-label">Activated Models</div>

                                <div id="model-dropdown-menu-container"></div>

                                <div class="menu-divider"></div>

                                <div id="manage-models-action" class="menu-action">
                                    <codify-icon name="wrench"></codify-icon>
                                    <span>Manage Models</span>
                                </div>
                            </div>
                        </div>

                    </div>

                    <div class="input-actions">
                        <button id="settings-btn" title="Change Settings">
                            <codify-icon name="wrench"></codify-icon>
                        </button>
                        <button id="sendBtn" class="disable" title="Send">
                            <codify-icon name="send-horizontal"></codify-icon>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add AI Model</h2>
                <button id="close-settings">✕</button>
            </div>

            <div class="modal-body">
                <!-- Step 1: Provider Selection -->
                <div class="form-group">
                    <label>Select Provider</label>
                    <select id="provider-select">
                        <!-- Dynamic: Filled from C# -->
                    </select>
                </div>

                <!-- Step 2: Model List (Checkboxes) -->
                <!-- We keep this area as the one that expands -->
                <div id="model-list-container" class="model-selection-area">
                    <label>Available Models</label>
                    <div id="models-checkbox-list" class="checkbox-list">
                        <!-- Dynamic: Filled based on Provider -->
                    </div>

                    <div id="model-pagination" class="pagination-controls hidden">
                        <button id="prev-page" class="pager-btn" disabled>&lt; Prev</button>
                        <span id="page-info">Page 1 of 1</span>
                        <button id="next-page" class="pager-btn">Next &gt;</button>
                    </div>

                    <div class="form-group">
                        <label>API Key</label>
                        <input id="model-api-key" type="text" placeholder="sx-...">
                    </div>

                    <button id="btn-show-add-custom" class="link-button">+ Add Custom Model</button>
                </div>



                <!-- Step 3: Custom Model Form (Hidden by default) -->
                <div id="custom-model-form" class="hidden-form hidden">
                    <hr>
                    <div class="form-group">
                        <label>Model ID</label>
                        <input id="custom-model-id" type="text" placeholder="e.g. gpt-4-turbo">
                    </div>
                    <div class="form-group">
                        <label>Token Limit</label>
                        <input id="custom-token-limit" type="number" value="128000">
                    </div>
                    <div class="form-group inline">
                        <label><input type="checkbox" id="custom-supports-images"> Images</label>
                        <label><input type="checkbox" id="custom-supports-tools"> Tools</label>
                    </div>
                </div>
            </div>

            <!-- Footer will stay at the very bottom -->
            <div class="modal-footer">
                <button id="save-settings-btn" class="primary-button">Save Changes</button>
            </div>
        </div>
    </div>


    



    <!-- JavaScript Bridges and logic -->
    <script type="module" src="../../../Shared/components/toastify.js"></script>
    <script type="module" src="../../../Shared/components/lodash.min.js"></script>
    <script type="module" src="../js/main.js"></script>
</body>
</html>
