<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS_PLACEHOLDER -->
</head>
<body>
<div class="chat-wrapper">

    <div class="chat-header">
        <span class="status-dot"></span>
        Codify Assistant
    </div>

    <div id="chat-container" class="messages-container">
        <div class="message ai">
            Hello! I'm Codify. How can I help you code today?
        </div>
    </div>

    <div class="input-container">
        <div class="input-box-wrapper">
            <textarea id="userInput"
                          placeholder="Ask Codify..."
                          rows="1"></textarea>

            <div class="input-actions">
                <button id="sendBtn" title="Send">
                    ➤
                </button>
            </div>
        </div>
    </div>

</div>

<!-- JS_PLACEHOLDER -->
</body>
</html>
